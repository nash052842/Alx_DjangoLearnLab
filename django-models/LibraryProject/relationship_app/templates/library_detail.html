<!DOCTYPE html>
<html>
<head><title>{{ library.name }}</title></head>
<body>
    <h1>Library: {{ library.name }}</h1>
    <h2>Books in this Library:</h2>
    <ul>
        {% for book in books %}
            <li>{{ book.title }} by {{ book.author.name }}</li>
        {% empty %}
            <li>No books available in this library.</li>
        {% endfor %}
    </ul>
</body>
</html>
